<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revende Ways | Panel de Pedidos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #0066ff;
            --primary-light: #0052cc;
            --bg: #f9fafb;
            --surface: #ffffff;
            --text: #1a1a1a;
            --text-light: #666;
            --border: #e5e5e5;
            --gray-light: #f3f4f6;
            --success: #00a650;
            --radius: 8px;
            --font: 'DM Sans', sans-serif;
            --shadow: 0 1px 3px rgba(0,0,0,.08);
            --shadow-lg: 0 4px 16px rgba(0,0,0,.12);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-size: 15px;
            line-height: 1.6;
        }

        /* HEADER */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 32px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-badge {
            background: var(--gray-light);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            display: none;
        }
        .user-badge.show { display: block; }
        .btn-logout {
            background: transparent;
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-light);
            transition: all .2s;
            display: none;
        }
        .btn-logout.show { display: block; }
        .btn-logout:hover { border-color: #e00; color: #e00; }

        /* LOGIN SCREEN */
        .login-screen {
            min-height: calc(100vh - 60px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 48px 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }
        .login-icon {
            width: 56px;
            height: 56px;
            background: #e8f0ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 26px;
        }
        .login-card h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .login-card p {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            font-family: var(--font);
            background: var(--surface);
            transition: all .2s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,102,255,.1);
        }
        .btn-primary {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
            font-family: var(--font);
        }
        .btn-primary:hover { background: var(--primary-light); }
        .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
        .login-error {
            background: #fff0f0;
            border: 1px solid #ffd0d0;
            color: #cc0000;
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .login-error.show { display: block; }

        /* MAIN LAYOUT */
        .main {
            display: none;
            max-width: 1300px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        .main.show { display: block; }

        /* PAGE TITLE + TOTAL INVOICE BTN */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .page-title {
            font-size: 24px;
            font-weight: 700;
        }
        .page-title span {
            color: var(--text-light);
            font-size: 15px;
            font-weight: 400;
            margin-left: 10px;
        }
        .btn-total-invoice {
            background: var(--text);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: var(--font);
            transition: opacity .2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-total-invoice:hover { opacity: .85; }
        .btn-total-invoice svg { flex-shrink: 0; }

        /* TABS - Nichos */
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--border);
            margin-bottom: 28px;
        }
        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            transition: all .2s;
            font-family: var(--font);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .tab-btn:hover { color: var(--text); }
        .tab-badge {
            background: var(--primary);
            color: white;
            font-size: 11px;
            font-weight: 700;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tab-badge.gray {
            background: var(--gray-light);
            color: var(--text-light);
        }

        /* TAB CONTENT */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .empty-state svg { margin-bottom: 16px; opacity: .4; }
        .empty-state h3 { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
        .empty-state p { font-size: 14px; }

        /* SUMMARY STATS ROW */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
        }
        .stat-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 6px;
        }
        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
        }
        .stat-value.green { color: var(--success); }

        /* ORDER CARD */
        .order-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .order-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--gray-light);
            flex-wrap: wrap;
            gap: 10px;
        }
        .order-meta {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .order-id {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
        }
        .order-date {
            font-size: 12px;
            color: var(--text-light);
        }
        .order-client-info {
            font-size: 13px;
            color: var(--text);
        }
        .order-client-info strong {
            font-weight: 600;
        }
        .order-code-badge {
            background: #e8f0ff;
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .3px;
        }
        .order-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pendiente { background: #fff7e0; color: #a06700; }
        .status-pagado { background: #e0f7ec; color: #007a3d; }
        .status-cancelado { background: #ffe0e0; color: #a00; }

        /* ORDER ITEMS TABLE */
        .order-items {
            padding: 0;
        }
        .items-table {
            width: 100%;
            border-collapse: collapse;
        }
        .items-table th {
            padding: 10px 20px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: .5px;
            border-bottom: 1px solid var(--border);
            background: #fbfbfb;
        }
        .items-table td {
            padding: 12px 20px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .items-table tr:last-child td { border-bottom: none; }
        .items-table tr:hover td { background: var(--gray-light); }
        .product-name-cell {
            font-weight: 500;
            color: var(--text);
            max-width: 280px;
        }

        /* ORDER FOOTER / TOTALS + BUTTONS */
        .order-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: var(--gray-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .order-totals {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .total-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .total-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: .5px;
        }
        .total-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
        }
        .total-value.primary { color: var(--primary); }
        .total-value.green { color: var(--success); }

        /* ACTION BUTTONS */
        .order-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-action {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: var(--font);
            transition: all .2s;
            white-space: nowrap;
        }
        .btn-copy {
            background: var(--gray-light);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-copy:hover { border-color: var(--primary); color: var(--primary); }
        .btn-copy.copied { background: #e0f7ec; border-color: var(--success); color: var(--success); }
        .btn-whatsapp {
            background: #25D366;
            color: white;
        }
        .btn-whatsapp:hover { background: #1da856; }
        .btn-invoice {
            background: var(--primary);
            color: white;
        }
        .btn-invoice:hover { background: var(--primary-light); }

        /* LOADING */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* CART SECTION */
        .cart-section {
            background: var(--surface);
            border: 2px solid var(--primary);
            border-radius: 10px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .cart-section-header {
            background: #e8f0ff;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .cart-section-header h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cart-live-badge {
            background: var(--primary);
            color: white;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 700;
        }

        /* MODAL CONFIRM */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.5);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: white;
            border-radius: 12px;
            padding: 32px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 12px 48px rgba(0,0,0,.2);
        }
        .modal-box h3 { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
        .modal-box p { color: var(--text-light); font-size: 14px; margin-bottom: 24px; }
        .modal-box .btn-primary { margin-top: 0; }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--text);
            color: white;
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            opacity: 0;
            transform: translateY(10px);
            transition: all .3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: var(--success); }

        @media (max-width: 768px) {
            .header { padding: 12px 16px; }
            .main { padding: 20px 16px; }
            .items-table { font-size: 13px; }
            .items-table th, .items-table td { padding: 10px 12px; }
            .order-footer { flex-direction: column; align-items: flex-start; }
            .tab-btn { padding: 10px 14px; font-size: 13px; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <a href="#" class="logo">Revende Ways</a>
    <div class="header-right">
        <div class="user-badge" id="user-badge">Cargando...</div>
        <button class="btn-logout" id="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
</header>

<!-- LOGIN SCREEN -->
<div class="login-screen" id="login-screen">
    <div class="login-card">
        <div class="login-icon">🔐</div>
        <h1>Panel de Pedidos</h1>
        <p>Ingresá la clave de acceso para ver todos los pedidos</p>
        <div class="login-error" id="login-error"></div>
        <div class="form-group">
            <label>Clave de acceso</label>
            <input type="password" class="form-input" id="login-pin" placeholder="••••••••••"
                onkeydown="if(event.key==='Enter') doLogin()" autocomplete="off" />
        </div>
        <button class="btn-primary" id="btn-login" onclick="doLogin()">Ingresar</button>
    </div>
</div>

<!-- MAIN PANEL -->
<main class="main" id="main-panel">

    <div class="page-header">
        <div>
            <div class="page-title">Mis pedidos <span id="pedidos-count-label"></span></div>
        </div>
        <button class="btn-total-invoice" onclick="downloadTotalInvoice()">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="12" y1="18" x2="12" y2="12"/>
                <polyline points="9 15 12 18 15 15"/>
            </svg>
            Descargar factura total
        </button>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn active" id="tab-btn-perfumes" onclick="switchTab('perfumes')">
            🌹 Perfumes Árabes
            <span class="tab-badge gray" id="badge-perfumes">0</span>
        </button>
        <button class="tab-btn" id="tab-btn-detodo" onclick="switchTab('detodo')">
            🛍️ De Todo
            <span class="tab-badge gray" id="badge-detodo">0</span>
        </button>
        <button class="tab-btn" id="tab-btn-calzados" onclick="switchTab('calzados')">
            👟 Calzados
            <span class="tab-badge gray" id="badge-calzados">0</span>
        </button>
    </div>

    <!-- TAB: PERFUMES -->
    <div class="tab-content active" id="tab-perfumes">
        <div id="cart-perfumes-section"></div>
        <div class="stats-row" id="stats-perfumes"></div>
        <div id="orders-perfumes">
            <div class="loading-state"><div class="spinner"></div><p>Cargando pedidos...</p></div>
        </div>
    </div>

    <!-- TAB: DE TODO -->
    <div class="tab-content" id="tab-detodo">
        <div id="cart-detodo-section"></div>
        <div class="stats-row" id="stats-detodo"></div>
        <div id="orders-detodo">
            <div class="loading-state"><div class="spinner"></div><p>Cargando pedidos...</p></div>
        </div>
    </div>

    <!-- TAB: CALZADOS -->
    <div class="tab-content" id="tab-calzados">
        <div id="cart-calzados-section"></div>
        <div class="stats-row" id="stats-calzados"></div>
        <div id="orders-calzados">
            <div class="loading-state"><div class="spinner"></div><p>Cargando pedidos...</p></div>
        </div>
    </div>

</main>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FIREBASE SCRIPTS (cdn.jsdelivr.net) -->
<script src="https://cdn.jsdelivr.net/npm/firebase@10.7.0/firebase-app-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.7.0/firebase-auth-compat.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@10.7.0/firebase-firestore-compat.min.js"></script>

<script>
// ═══════════════════════════════════════
// FIREBASE CONFIG (misma base de datos)
// ═══════════════════════════════════════
const firebaseConfig = {
    apiKey: "AIzaSyBRzd3HXbY6xIBIBNkzATo70kredodhKwc",
    authDomain: "revendeways-auth.firebaseapp.com",
    projectId: "revendeways-auth",
    storageBucket: "revendeways-auth.appspot.com",
    messagingSenderId: "157263733033",
    appId: "1:157263733033:web:a2b8c3d4e5f6g7h8i9j0k1l"
};

// Init diferido hasta que todos los scripts externos estén cargados

// ═══════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════
let currentUser = null;
let allPedidos = [];
let currentTab = 'perfumes';
const WA_NUMBER = '5491176277337';

// ═══════════════════════════════════════
// ACCESO POR CLAVE ÚNICA
// ═══════════════════════════════════════
const ACCESS_KEY = '389162001';
const SESSION_KEY = 'rw_panel_access';

function checkSession() {
    if (sessionStorage.getItem(SESSION_KEY) === 'ok') {
        showPanel();
        loadAllData();
    } else {
        showLogin();
    }
}

function doLogin() {
    const pin = document.getElementById('login-pin').value.trim();
    const btn = document.getElementById('btn-login');
    if (!pin) { showLoginError('Ingresá la clave de acceso'); return; }
    if (pin === ACCESS_KEY) {
        sessionStorage.setItem(SESSION_KEY, 'ok');
        showPanel();
        loadAllData();
    } else {
        showLoginError('Clave incorrecta. Intentá de nuevo.');
        document.getElementById('login-pin').value = '';
        document.getElementById('login-pin').focus();
        btn.disabled = false;
        btn.textContent = 'Ingresar';
    }
}

function showLoginError(msg) {
    const el = document.getElementById('login-error');
    el.textContent = msg;
    el.classList.add('show');
}

function logout() {
    sessionStorage.removeItem(SESSION_KEY);
    showLogin();
}

function showLogin() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-panel').classList.remove('show');
    document.getElementById('user-badge').classList.remove('show');
    document.getElementById('btn-logout').classList.remove('show');
}

function showPanel() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-panel').classList.add('show');
    document.getElementById('user-badge').textContent = 'Panel Revende Ways';
    document.getElementById('user-badge').classList.add('show');
    document.getElementById('btn-logout').classList.add('show');
}

// ═══════════════════════════════════════
// CARGAR TODOS LOS PEDIDOS (todos los revendedores)
// ═══════════════════════════════════════
async function loadAllData() {
    try {
        // Traer todos los usuarios
        const usersSnap = await firebase.firestore().collection('usuarios').get();

        allPedidos = [];
        const promises = [];

        usersSnap.forEach(userDoc => {
            const userData = userDoc.data();
            promises.push(
                firebase.firestore()
                    .collection('usuarios').doc(userDoc.id)
                    .collection('pedidos')
                    .orderBy('fechaCreacion', 'desc')
                    .get()
                    .then(snap => {
                        snap.forEach(doc => {
                            allPedidos.push({
                                id: doc.id,
                                _uid: userDoc.id,
                                _userName: userData.nombre || userData.email || userDoc.id,
                                _userEmail: userData.email || '',
                                _userCodigo: userData.codigoVendedor || '',
                                ...doc.data()
                            });
                        });
                    })
                    .catch(() => {})
            );
        });

        await Promise.all(promises);

        // Ordenar por fecha descendente
        allPedidos.sort((a, b) => {
            const fa = a.fechaCreacion?.seconds || 0;
            const fb = b.fechaCreacion?.seconds || 0;
            return fb - fa;
        });

        // Cargar también todos los carritos activos
        const cartPromises = [];
        const cartItems = [];
        usersSnap.forEach(userDoc => {
            cartPromises.push(
                firebase.firestore()
                    .collection('usuarios').doc(userDoc.id)
                    .collection('carrito').doc('actual')
                    .get()
                    .then(cartDoc => {
                        if (cartDoc.exists) {
                            const data = cartDoc.data();
                            (data.items || []).forEach(item => {
                                cartItems.push({
                                    ...item,
                                    _userName: userDoc.data().nombre || userDoc.data().email || '',
                                    _userCodigo: userDoc.data().codigoVendedor || ''
                                });
                            });
                        }
                    })
                    .catch(() => {})
            );
        });
        await Promise.all(cartPromises);

        // Clasificar
        const perfumes = allPedidos.filter(p => esNichoPerfumes(p));
        const detodo = allPedidos.filter(p => esNichoDetodo(p));
        const calzados = allPedidos.filter(p => esNichoCalzados(p));

        updateBadge('perfumes', perfumes.length);
        updateBadge('detodo', detodo.length);
        updateBadge('calzados', calzados.length);

        document.getElementById('pedidos-count-label').textContent = allPedidos.length > 0 ? `(${allPedidos.length} pedido${allPedidos.length !== 1 ? 's' : ''})` : '';

        // Carrito: solo perfumes por ahora
        renderCartSection(cartItems.filter(i => {
            const n = (i.nombre || '').toLowerCase();
            return ['perfume','arabe','oud','lattafa','haramain','eau de','extrait'].some(k => n.includes(k));
        }), 'cart-perfumes-section');

        renderStats(perfumes, 'stats-perfumes');
        renderOrders(perfumes, 'orders-perfumes', 'Perfumes Árabes');

        renderStats(detodo, 'stats-detodo');
        renderOrders(detodo, 'orders-detodo', 'De Todo');

        renderStats(calzados, 'stats-calzados');
        renderOrders(calzados, 'orders-calzados', 'Calzados');

    } catch (err) {
        console.error('Error cargando datos:', err);
        ['orders-perfumes','orders-detodo','orders-calzados'].forEach(id => {
            document.getElementById(id).innerHTML = '<div class="empty-state"><p>Error al cargar pedidos. Intente de nuevo.</p></div>';
        });
    }
}

// ═══════════════════════════════════════
// CLASIFICACIÓN POR NICHO
// ═══════════════════════════════════════
function esNichoPerfumes(pedido) {
    if (!pedido.items || pedido.items.length === 0) {
        return pedido.nicho === 'perfumes' || (!pedido.nicho && true);
    }
    const perfumeKeywords = ['perfume', 'arabe', 'árabe', 'oud', 'lattafa', 'haramain', 'body splash', 'eau de', 'extrait', 'fragrance'];
    return pedido.items.some(item => {
        const nombre = (item.nombre || '').toLowerCase();
        return perfumeKeywords.some(k => nombre.includes(k));
    });
}

function esNichoCalzados(pedido) {
    if (pedido.nicho === 'calzados') return true;
    if (!pedido.items || pedido.items.length === 0) return false;
    const calzadoKeywords = ['zapatilla', 'zapato', 'bota', 'sandalia', 'calzado', 'mocasín', 'deportiva', 'sneaker', 'talle'];
    return pedido.items.some(item => {
        const nombre = (item.nombre || '').toLowerCase();
        return calzadoKeywords.some(k => nombre.includes(k));
    });
}

function esNichoDetodo(pedido) {
    return !esNichoPerfumes(pedido) && !esNichoCalzados(pedido);
}

            </div>
            <table class="items-table">

// ═══════════════════════════════════════
// RENDER ORDERS
// ═══════════════════════════════════════
function renderOrders(pedidos, containerId, nichoLabel) {
    const el = document.getElementById(containerId);
    if (!el) return;
    if (pedidos.length === 0) {
        el.innerHTML = `
            <div class="empty-state">
                <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                    <rect x="9" y="3" width="6" height="4" rx="1"/>
                </svg>
                <h3>Sin pedidos en ${nichoLabel}</h3>
                <p>Los pedidos de esta categoría aparecerán aquí una vez que se realicen.</p>
            </div>`;
        return;
    }
    el.innerHTML = pedidos.map((p, idx) => buildOrderCard(p, idx)).join('');
}

function buildOrderCard(pedido, idx) {
    const fecha = pedido.fechaCreacion?.toDate ? pedido.fechaCreacion.toDate() : new Date(pedido.fechaCreacion?.seconds * 1000 || Date.now());
    const fechaStr = fecha.toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric' }) + ' · ' + fecha.toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
    const cliente = pedido.cliente || {};
    const clienteNombre = [cliente.nombre, cliente.apellido].filter(Boolean).join(' ') || pedido.email || 'Sin nombre';
    const codigo = pedido.codigoVendedor || pedido._userCodigo || '—';
    const estado = pedido.estado || 'pendiente';
    const items = pedido.items || [];
    const totalInv = pedido.totalInversion || items.reduce((s, i) => s + ((i.precio || 0) * (i.cantidad || 1)), 0);
    const totalGan = pedido.totalGanancia || 0;
    const totalFin = pedido.totalFinal || totalInv;

    const rowsHtml = items.map(item => `
        <tr>
            <td class="product-name-cell">${item.nombre || '—'}</td>
            <td style="text-align:center;font-weight:600">${item.cantidad || 1}</td>
            <td style="text-align:right">$${(item.precio || 0).toLocaleString()}</td>
            <td style="text-align:right">$${(item.subtotal || (item.precio * item.cantidad) || 0).toLocaleString()}</td>
            <td style="text-align:right;color:var(--success);font-weight:600">+$${Math.round(item.ganancia || 0).toLocaleString()}</td>
        </tr>`).join('');

    return `
    <div class="order-card" id="order-${pedido.id}">
        <div class="order-header">
            <div class="order-meta">
                <div class="order-id">Pedido #${pedido.id.slice(-8).toUpperCase()}</div>
                <div class="order-date">${fechaStr}</div>
            </div>
            <div class="order-client-info">
                <strong>${clienteNombre}</strong>
                ${cliente.ciudad ? ' · ' + cliente.ciudad : ''}
                ${cliente.telefono ? ' · ' + cliente.telefono : ''}
            </div>
            <span class="order-code-badge">${codigo}</span>
            <span class="order-status status-${estado}">${estado.charAt(0).toUpperCase() + estado.slice(1)}</span>
        </div>
        <div class="order-items">
            <table class="items-table">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th style="text-align:center">Cant.</th>
                        <th style="text-align:right">Precio unit.</th>
                        <th style="text-align:right">Subtotal</th>
                        <th style="text-align:right">Ganancia</th>
                    </tr>
                </thead>
                <tbody>${rowsHtml}</tbody>
            </table>
        </div>
        <div class="order-footer">
            <div class="order-totals">
                <div class="total-item">
                    <div class="total-label">Inversión</div>
                    <div class="total-value">$${Math.round(totalInv).toLocaleString()}</div>
                </div>
                <div class="total-item">
                    <div class="total-label">Ganancia</div>
                    <div class="total-value green">+$${Math.round(totalGan).toLocaleString()}</div>
                </div>
                <div class="total-item">
                    <div class="total-label">Total con ganancia</div>
                    <div class="total-value primary">$${Math.round(totalFin).toLocaleString()}</div>
                </div>
            </div>
            <div class="order-actions">
                <button class="btn-action btn-copy" onclick="copyOrder('${pedido.id}', this)" title="Copiar pedido">
                    📋 Copiar
                </button>
                <button class="btn-action btn-whatsapp" onclick="sendWhatsApp('${pedido.id}')" title="Enviar por WhatsApp">
                    📱 WhatsApp
                </button>
                <button class="btn-action btn-invoice" onclick="downloadInvoice('${pedido.id}')" title="Descargar factura">
                    📄 Factura
                </button>
            </div>
        </div>
    </div>`;
}

// ═══════════════════════════════════════
// BUILD ORDER TEXT
// ═══════════════════════════════════════
function buildOrderText(pedido) {
    const fecha = pedido.fechaCreacion?.toDate ? pedido.fechaCreacion.toDate() : new Date(pedido.fechaCreacion?.seconds * 1000 || Date.now());
    const fechaStr = fecha.toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric' });
    const cliente = pedido.cliente || {};
    const clienteNombre = [cliente.nombre, cliente.apellido].filter(Boolean).join(' ') || pedido.email || 'Sin nombre';
    const codigo = pedido.codigoVendedor || pedido._userCodigo || '—';
    const items = pedido.items || [];
    const totalInv = pedido.totalInversion || items.reduce((s, i) => s + ((i.precio || 0) * (i.cantidad || 1)), 0);
    const totalGan = pedido.totalGanancia || 0;
    const totalFin = pedido.totalFinal || totalInv;

    let txt = `━━━━━━━━━━━━━━━━━━━━━━━━━━━\n`;
    txt += `🛍️ REVENDE WAYS — PEDIDO\n`;
    txt += `━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n`;
    txt += `📋 Pedido #${pedido.id.slice(-8).toUpperCase()}\n`;
    txt += `📅 Fecha: ${fechaStr}\n`;
    txt += `🔑 Código revendedor: ${codigo}\n`;
    txt += `👤 Cliente: ${clienteNombre}\n`;
    if (cliente.telefono) txt += `📞 Tel: ${cliente.telefono}\n`;
    if (cliente.ciudad) txt += `📍 Ciudad: ${cliente.ciudad}${cliente.provincia ? ', ' + cliente.provincia : ''}\n`;
    if (cliente.direccion) txt += `🏠 Dirección: ${cliente.direccion}\n`;
    if (cliente.observaciones) txt += `📝 Obs: ${cliente.observaciones}\n`;
    txt += `\n`;
    txt += `─── PRODUCTOS ─────────────────\n`;
    items.forEach((item, i) => {
        txt += `${i + 1}. ${item.nombre}\n`;
        txt += `   Cant: ${item.cantidad || 1} × $${(item.precio || 0).toLocaleString()} = $${((item.subtotal || item.precio * item.cantidad) || 0).toLocaleString()}\n`;
    });
    txt += `\n─── TOTALES ────────────────────\n`;
    txt += `💰 Inversión: $${Math.round(totalInv).toLocaleString()}\n`;
    txt += `📈 Ganancia estimada: $${Math.round(totalGan).toLocaleString()}\n`;
    txt += `✅ Total con ganancia: $${Math.round(totalFin).toLocaleString()}\n`;
    txt += `\n━━━━━━━━━━━━━━━━━━━━━━━━━━━`;
    return txt;
}

// ═══════════════════════════════════════
// COPY ORDER
// ═══════════════════════════════════════
function copyOrder(pedidoId, btn) {
    const pedido = allPedidos.find(p => p.id === pedidoId);
    if (!pedido) return;
    const txt = buildOrderText(pedido);
    navigator.clipboard.writeText(txt).then(() => {
        const original = btn.innerHTML;
        btn.innerHTML = '✅ Copiado';
        btn.classList.add('copied');
        setTimeout(() => { btn.innerHTML = original; btn.classList.remove('copied'); }, 2000);
        showToast('Pedido copiado al portapapeles', 'success');
    }).catch(() => {
        showToast('No se pudo copiar. Intente de nuevo.');
    });
}

// ═══════════════════════════════════════
// WHATSAPP
// ═══════════════════════════════════════
function sendWhatsApp(pedidoId) {
    const pedido = allPedidos.find(p => p.id === pedidoId);
    if (!pedido) return;
    const txt = buildOrderText(pedido);
    window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(txt)}`, '_blank');
}

function downloadInvoice(pedidoId) {

    const doc = new jsPDF({ format: 'a4', unit: 'mm' });

    const fechaStr = fecha.toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric' });
    const cliente = pedido.cliente || {};
    const clienteNombre = [cliente.nombre, cliente.apellido].filter(Boolean).join(' ') || pedido.email || 'Sin nombre';
    const codigo = pedido.codigoVendedor || pedido._userCodigo || '—';
    const items = pedido.items || [];
    const totalInv = pedido.totalInversion || 0;
    const totalGan = pedido.totalGanancia || 0;
    const totalFin = pedido.totalFinal || totalInv;

    const lm = 20;
    const pw = 170;

    doc.setFillColor(0, 102, 255);
    doc.rect(0, 0, 210, 14, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');

    doc.setTextColor(0, 0, 0);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(16);
    doc.text('FACTURA DE PEDIDO', lm, y);
    y += 7;
    doc.setDrawColor(0, 102, 255);
    doc.setLineWidth(0.5);
    doc.line(lm, y, lm + pw, y);
    y += 8;

    // Pedido info + cliente
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(0, 102, 255);
    doc.text('DATOS DEL PEDIDO', lm, y);
    y += 5;
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(0, 0, 0);
    doc.text(`Pedido N°: ${pedido.id.slice(-8).toUpperCase()}`, lm, y); y += 5;
    doc.text(`Fecha: ${fechaStr}`, lm, y); y += 5;
    doc.text(`Código revendedor: ${codigo}`, lm, y); y += 5;
    doc.text(`Estado: ${(pedido.estado || 'pendiente').toUpperCase()}`, lm, y); y += 10;

    doc.setFont('helvetica', 'bold');
    doc.setTextColor(0, 102, 255);
    doc.text('DATOS DEL CLIENTE', lm, y);
    y += 5;
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(0, 0, 0);
    doc.text(`Nombre: ${clienteNombre}`, lm, y); y += 5;
    if (cliente.telefono) { doc.text(`Teléfono: ${cliente.telefono}`, lm, y); y += 5; }
    if (cliente.ciudad) { doc.text(`Ciudad: ${cliente.ciudad}${cliente.provincia ? ', ' + cliente.provincia : ''}`, lm, y); y += 5; }
    if (cliente.direccion) { doc.text(`Dirección: ${cliente.direccion}`, lm, y); y += 5; }
    if (cliente.cp) { doc.text(`Código Postal: ${cliente.cp}`, lm, y); y += 5; }
    if (cliente.observaciones) { doc.text(`Observaciones: ${cliente.observaciones}`, lm, y); y += 5; }
    y += 5;

    // Products table header
    doc.setFillColor(0, 102, 255);
    doc.rect(lm, y, pw, 7, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.text('PRODUCTO', lm + 2, y + 5);
    doc.text('CANT.', lm + 100, y + 5);
    doc.text('PRECIO', lm + 120, y + 5);
    doc.text('SUBTOTAL', lm + 143, y + 5);
    doc.text('GANANCIA', lm + 156, y + 5);
    y += 9;

    // Products rows
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(8.5);
    items.forEach((item, i) => {
        if (y > 260) { doc.addPage(); y = 20; }
        const bg = i % 2 === 0 ? [249, 250, 251] : [255, 255, 255];
        doc.setFillColor(...bg);
        doc.rect(lm, y - 1, pw, 7, 'F');
        const nombreCorto = (item.nombre || '').length > 55 ? (item.nombre || '').slice(0, 53) + '...' : (item.nombre || '');
        doc.text(nombreCorto, lm + 2, y + 4);
        doc.text(String(item.cantidad || 1), lm + 102, y + 4);
        doc.text(`$${(item.precio || 0).toLocaleString()}`, lm + 118, y + 4);
        const sub = item.subtotal || ((item.precio || 0) * (item.cantidad || 1));
        doc.text(`$${sub.toLocaleString()}`, lm + 141, y + 4);
        doc.text(`+$${Math.round(item.ganancia || 0).toLocaleString()}`, lm + 154, y + 4);
        y += 7;
    });

    y += 5;
    // Totals box
    doc.setFillColor(243, 244, 246);
    doc.rect(lm + 80, y, 90, 28, 'F');
    doc.setDrawColor(0, 102, 255);
    doc.rect(lm + 80, y, 90, 28, 'S');
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(100, 100, 100);
    doc.text('Inversión total:', lm + 83, y + 7);
    doc.text('Ganancia estimada:', lm + 83, y + 14);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);

    doc.text('Total con ganancia:', lm + 83, y + 22);

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(0, 0, 0);
    doc.text(`$${Math.round(totalInv).toLocaleString()}`, 195, y + 7, { align: 'right' });
    doc.setTextColor(0, 166, 80);
    doc.text(`+$${Math.round(totalGan).toLocaleString()}`, 195, y + 14, { align: 'right' });
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.setTextColor(0, 102, 255);
    doc.text(`$${Math.round(totalFin).toLocaleString()}`, 195, y + 22, { align: 'right' });

    // Footer
    y += 40;
    doc.setDrawColor(200, 200, 200);
    doc.line(lm, y, lm + pw, y);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(150, 150, 150);
    doc.text('Revende Ways — Plataforma mayorista de revendedores', lm, y + 5);
    doc.text(`Generado el ${new Date().toLocaleDateString('es-AR')}`, lm + pw, y + 5, { align: 'right' });

    doc.save(`factura-pedido-${pedido.id.slice(-8).toUpperCase()}.pdf`);
    showToast('Factura descargada', 'success');
}

    doc.setTextColor(0, 0, 0);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(16);
    doc.text('FACTURA TOTAL DE PEDIDOS', lm, y);
    y += 6;
    doc.setDrawColor(0, 102, 255);
    doc.setLineWidth(0.5);
    doc.line(lm, y, lm + pw, y);
    y += 8;

    // Revendedor info
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(60, 60, 60);
    doc.text('Panel Revende Ways  ·  Todos los revendedores', lm, y); y += 5;
    doc.text(`Fecha: ${new Date().toLocaleDateString('es-AR')}`, lm, y); y += 10;

    // Grand totals
    const grandInv = allPedidos.reduce((s, p) => s + (p.totalInversion || 0), 0);
    const grandGan = allPedidos.reduce((s, p) => s + (p.totalGanancia || 0), 0);
    const grandFin = allPedidos.reduce((s, p) => s + (p.totalFinal || 0), 0);

    doc.setFillColor(232, 240, 255);
    doc.rect(lm, y, pw, 24, 'F');
    doc.setDrawColor(0, 102, 255);
    doc.rect(lm, y, pw, 24, 'S');
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(60, 60, 60);
    doc.text(`Total pedidos: ${allPedidos.length}`, lm + 4, y + 7);
    doc.text(`Inversión total: $${Math.round(grandInv).toLocaleString()}`, lm + 4, y + 14);
    doc.text(`Ganancia total estimada: +$${Math.round(grandGan).toLocaleString()}`, lm + 4, y + 21);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.setTextColor(0, 102, 255);
    doc.text(`TOTAL GENERAL: $${Math.round(grandFin).toLocaleString()}`, lm + pw - 4, y + 21, { align: 'right' });
    y += 30;

    // Each nicho section
    const sections = [
        { label: '🌹 PERFUMES ÁRABES', pedidos: allPedidos.filter(p => esNichoPerfumes(p)) },
        { label: '🛍️ DE TODO', pedidos: allPedidos.filter(p => esNichoDetodo(p)) },
        { label: '👟 CALZADOS', pedidos: allPedidos.filter(p => esNichoCalzados(p)) }
    ];

    sections.forEach(section => {
        if (section.pedidos.length === 0) return;
        if (y > 240) { doc.addPage(); y = 20; }

        doc.setFillColor(0, 102, 255);
        doc.rect(lm, y, pw, 8, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(10);
        doc.text(section.label.replace(/[^\w\s áéíóúñ.]/gi,''), lm + 3, y + 5.5);
        const invSec = section.pedidos.reduce((s,p) => s + (p.totalInversion||0), 0);
        const finSec = section.pedidos.reduce((s,p) => s + (p.totalFinal||0), 0);
        doc.text(`${section.pedidos.length} ped. · Inv: $${Math.round(invSec).toLocaleString()} · Total: $${Math.round(finSec).toLocaleString()}`, lm + pw, y + 5.5, { align: 'right' });
        y += 10;

        section.pedidos.forEach(pedido => {
            if (y > 250) { doc.addPage(); y = 20; }
            const fecha = pedido.fechaCreacion?.toDate ? pedido.fechaCreacion.toDate() : new Date(pedido.fechaCreacion?.seconds * 1000 || Date.now());
            const fechaStr = fecha.toLocaleDateString('es-AR');
            const items = pedido.items || [];
            const cliente = pedido.cliente || {};
            const clienteNombre = [cliente.nombre, cliente.apellido].filter(Boolean).join(' ') || pedido.email || '—';

            doc.setFillColor(249, 250, 251);
            doc.rect(lm, y - 1, pw, 6, 'F');
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(8.5);
            doc.setTextColor(0, 0, 0);
            doc.text(`#${pedido.id.slice(-8).toUpperCase()} — ${fechaStr} — ${clienteNombre}`, lm + 2, y + 3.5);
            doc.setTextColor(0, 102, 255);
            doc.text(`$${Math.round(pedido.totalFinal || 0).toLocaleString()}`, lm + pw - 2, y + 3.5, { align: 'right' });
            y += 7;

            doc.setFont('helvetica', 'normal');
            doc.setFontSize(8);
            doc.setTextColor(60, 60, 60);
            items.forEach(item => {
                if (y > 272) { doc.addPage(); y = 20; }
                const nombre = (item.nombre || '').length > 70 ? item.nombre.slice(0,68) + '...' : item.nombre;
                doc.text(`  • ${nombre} (×${item.cantidad || 1}) — $${((item.subtotal || (item.precio||0)*(item.cantidad||1))).toLocaleString()}`, lm + 2, y + 3);
                y += 5;
            });
            y += 3;
        });
        y += 6;
    });

    // Footer
    doc.setDrawColor(200, 200, 200);
    doc.line(lm, y, lm + pw, y);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(150, 150, 150);
    doc.text('Revende Ways — Plataforma mayorista de revendedores', lm, y + 5);
    doc.text(`Generado el ${new Date().toLocaleDateString('es-AR')}`, lm + pw, y + 5, { align: 'right' });

    doc.save(`factura-total-${new Date().toLocaleDateString('es-AR').replace(/\//g,'-')}.pdf`);
    showToast('Factura total descargada', 'success');
}

// ═══════════════════════════════════════
// TABS
// ═══════════════════════════════════════
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('tab-btn-' + tab).classList.add('active');
}

function updateBadge(tab, count) {
    const el = document.getElementById('badge-' + tab);
    if (!el) return;
    el.textContent = count;
    if (count > 0) {
        el.classList.remove('gray');
    } else {
        el.classList.add('gray');
    }
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type === 'success' ? ' success' : '');
    clearTimeout(window._toastTimer);
    window._toastTimer = setTimeout(() => { t.className = 'toast'; }, 3000);
}

window.addEventListener('load', function() {
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});
    checkSession();
});
</script>
